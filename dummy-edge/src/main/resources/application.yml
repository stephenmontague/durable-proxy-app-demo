spring:
  application:
    name: dummy-edge

server:
  port: 8092

edge:
  # Where this device pushes inbound messages (the proxy's ingress channels)
  proxy:
    http-base: http://localhost:8090
    command-result-path: /command-result
    tcp-host: 127.0.0.1
    config-ack-port: 6001
    ftp-host: 127.0.0.1
    ftp-port: 2221
    ftp-user: edge
    ftp-password: edge
    report-upload-folder: report-uploads
  # This device's own channels (where the proxy delivers outbound messages)
  tcp-listen-port: 9001
  ftp-listen-port: 2222
  ftp-root: ./data/edge-ftp
  ftp-user: edge
  ftp-password: edge
  report-request-folder: report-requests
  # Simulated device latency before it pushes the paired confirm
  confirm-delay-ms: 300

# Heartbeat/ack trace (PING/PONG, ACK) for the persistent channel — OFF by default so it never adds
# noise. The persistent / sandbox-* profiles flip it to INFO for the demo.
logging:
  level:
    heartbeat: "OFF"

---
spring:
  config:
    activate:
      on-profile: local

---
# MLLP-style TCP wire protocol for the framed demo (just run-dummy-edge-framed).
# Pair with config/framed-routes.json on the proxy side.
spring:
  config:
    activate:
      on-profile: framed

edge:
  tcp:
    start-delimiter: "\x0B"
    end-delimiter: "\x1C\x0D"
    ack-reply: "\x0BACK\x1C\x0D"
    expected-ack: "ACK"

---
# Device speaks XML instead of JSON (just run-dummy-edge-xml). Pair with COMMAND_RESULT set to
# the xml codec on the proxy — just demo-command-http-xml does that switch automatically.
spring:
  config:
    activate:
      on-profile: xml

edge:
  xml: true

---
# Persistent-session device (just run-dummy-edge-persistent): the device listens on 9100, the
# proxy dials in as a CLIENT and keeps the socket warm with PING/PONG heartbeats. A command rides
# the live socket and the device pushes CONFIG_ACK back over the same socket. Pair with
# config/persistent-routes.json (just demo-config-persistent).
spring:
  config:
    activate:
      on-profile: persistent

logging:
  level:
    heartbeat: INFO
edge:
  persistent:
    enabled: true
    listen-port: 9100

---
# Sandbox A — warehouse sortation device: CSV telemetry, STX/ETX framing, persistent socket.
# One binary, config-only. Pair with config/sandbox-a-*.json on namespace sandbox-a.
# (just run-dummy-edge-sandbox-a)
spring:
  config:
    activate:
      on-profile: sandbox-a
logging:
  level:
    heartbeat: INFO
edge:
  tcp:
    start-delimiter: "\x02"   # STX
    end-delimiter: "\x03"     # ETX
  persistent:
    enabled: true
    listen-port: 9100
    emit-payload: "SCAN,PKG-44821,LANE-3,2026-06-15T14:03:22"
    emit-interval-sec: 8

---
# Sandbox B — utility smart-grid gateway: XML telemetry, <start>/end framing, persistent socket.
# Same binary, totally different client. Offset ports so it sits next to Sandbox A.
# Pair with config/sandbox-b-*.json on namespace sandbox-b. (just run-dummy-edge-sandbox-b)
spring:
  config:
    activate:
      on-profile: sandbox-b
server:
  port: 8192
logging:
  level:
    heartbeat: INFO
edge:
  tcp-listen-port: 9201
  ftp-listen-port: 2322
  tcp:
    start-delimiter: "<start>"
    end-delimiter: "end"
  persistent:
    enabled: true
    listen-port: 9300
    emit-payload: "<reading><meter>M-9001</meter><kwh>42.5</kwh></reading>"
    emit-interval-sec: 12
