spring:
  application:
    name: dummy-cloud
  # H2 read model (UI hydration). File-backed so config persists across restarts; per-install the
  # run-cloud-ns recipe overrides the URL to ./data/cloud-${namespace} (embedded H2 locks per process).
  datasource:
    url: jdbc:h2:file:./data/cloud-default
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8091

cloud:
  temporal:
    target: 127.0.0.1:7233
    namespace: default
  proxy:
    task-queue: proxy-main
    control-task-queue: proxy-control
    control-workflow-id: proxy-control

---
spring:
  config:
    activate:
      on-profile: local
